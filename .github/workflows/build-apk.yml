name: Build WhatsApp Scheduler APK

# يبني APK تلقائياً على لينكس (nodejs-mobile يُبنى فقط على Linux/macOS، لا يعمل على ويندوز)
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install app dependencies
        run: npm install

      - name: Install Node engine (Baileys) dependencies
        run: cd nodejs-assets/nodejs-project && npm install --omit=dev --omit=optional --ignore-scripts

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wa-scheduler-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
